<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dar El Zit - IA Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, 'Segoe UI', 'Inter', sans-serif;
            background: linear-gradient(135deg, #e8f3e5 0%, #c8e0c4 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            max-width: 800px;
            width: 100%;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 32, 0, 0.25);
            overflow: hidden;
            transition: transform 0.2s ease;
        }
        .hero {
            background: linear-gradient(120deg, #1f4f1f, #2a6b2a);
            padding: 32px 24px;
            text-align: center;
            color: white;
        }
        .hero i {
            font-size: 52px;
            filter: drop-shadow(2px 4px 8px rgba(0,0,0,0.2));
        }
        .hero h1 {
            font-size: 2rem;
            margin: 12px 0 6px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .hero p {
            font-size: 0.9rem;
            opacity: 0.9;
            font-weight: 400;
        }
        .content {
            padding: 32px;
        }
        .question-area {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .question-area input {
            flex: 1;
            padding: 16px 22px;
            border: 1.5px solid #cde2cd;
            border-radius: 60px;
            font-size: 1rem;
            font-family: inherit;
            background: #fefef9;
            transition: all 0.2s;
        }
        .question-area input:focus {
            outline: none;
            border-color: #2a6b2a;
            box-shadow: 0 0 0 3px rgba(42,107,42,0.2);
        }
        .question-area button {
            background: #2a6b2a;
            border: none;
            padding: 0 32px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }
        .question-area button:hover {
            background: #1f4f1f;
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(0,32,0,0.2);
        }
        .answer-panel {
            background: #f9fdf7;
            border-radius: 32px;
            padding: 26px;
            border-left: 8px solid #3c8c3c;
            box-shadow: 0 5px 12px rgba(0,0,0,0.03);
        }
        .answer-header {
            font-weight: 700;
            color: #2a6b2a;
            margin-bottom: 14px;
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .answer-content {
            font-size: 1rem;
            line-height: 1.55;
            color: #1c2e1a;
            white-space: pre-wrap;
        }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 28px;
            color: #7a9a76;
            border-top: 1px solid #d9e8d6;
            padding-top: 20px;
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="hero">
        <i class="fas fa-robot"></i>
        <h1>Dar El Zit IA</h1>
        <p>Assistant intelligent – Posez n’importe quelle question</p>
    </div>
    <div class="content">
        <div class="question-area">
            <input type="text" id="questionInput" placeholder="Ex: Quelle est la température idéale de malaxage ?">
            <button id="askBtn">Envoyer</button>
        </div>
        <div class="answer-panel">
            <div class="answer-header">
                <span>🧠 Réponse IA</span>
            </div>
            <div class="answer-content" id="answerDisplay">
                Posez votre question sur l’extraction d’huile d’olive, les procédés, la qualité, le stockage...
            </div>
        </div>
        
    </div>
</div>

<script>
    // 🔑 TA CLÉ API (valide)
    const API_KEY = "AIzaSyD525OSp2MKkwZA46dwD1RAMwAjWLsEDI0";
    // ✅ Utilisation du modèle gemini-2.5-flash
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

    const askBtn = document.getElementById('askBtn');
    const questionInput = document.getElementById('questionInput');
    const answerDisplay = document.getElementById('answerDisplay');

    async function askGemini(question) {
        if (!question.trim()) return "Veuillez écrire une question.";

        answerDisplay.innerHTML = "🤔 Réflexion en cours...";
        answerDisplay.parentElement.parentElement.classList.add('loading');

        try {
            const prompt = `Tu es un expert professionnel en extraction d'huile d'olive, spécialiste du pressoir "Dar El Zit" en Tunisie. Réponds de manière TRÈS CONCISE, en 4 à 5 phrases , technique mais accessible, en français. Ne parle pas de consommation d'eau ni de déchets. Concentre-toi sur : les étapes (broyage, malaxage, séparation, filtration, stockage), les types de systèmes (2 phases, 3 phases, traditionnel), les réglages (température, durée), la qualité de l'huile (acidité, polyphénols), l'optimisation du rendement, la conservation. Question : ${question}`;

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || "Erreur API");
            }

            const data = await response.json();
            const answer = data.candidates[0].content.parts[0].text;
            answerDisplay.innerHTML = answer.replace(/\n/g, '<br>');
        } catch (error) {
            console.error(error);
            answerDisplay.innerHTML = `❌ Erreur : ${error.message}<br><br>Vérifie ta clé API ou ta connexion internet.`;
        } finally {
            answerDisplay.parentElement.parentElement.classList.remove('loading');
        }
    }

    askBtn.addEventListener('click', () => {
        askGemini(questionInput.value);
        questionInput.value = "";
    });

    questionInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') askBtn.click();
    });
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</body>
</html>
