<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Dar El Zit | Zitouna IA & Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: radial-gradient(circle at 10% 30%, #020301 0%, #1e2a1a 100%);
        font-family: 'Inter', sans-serif;
        padding: 0.8rem;
        min-height: 100vh;
        position: relative;
    }
    body::before {
        content: "🌿";
        font-size: 220px;
        position: fixed;
        bottom: -30px;
        right: -30px;
        opacity: 0.08;
        pointer-events: none;
        transform: rotate(15deg);
        color: #B6AB6D;
    }
    body::after {
        content: "🫒";
        font-size: 160px;
        position: fixed;
        top: -20px;
        left: -20px;
        opacity: 0.07;
        pointer-events: none;
        transform: rotate(-10deg);
        color: #ADD6AB;
    }
    .dashboard {
        max-width: 1300px;
        width: 100%;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        position: relative;
        z-index: 2;
    }
    .glass-card {
        background: rgba(250, 245, 226, 0.94);
        backdrop-filter: blur(2px);
        border-radius: 28px;
        box-shadow: 0 12px 25px -10px rgba(0,0,0,0.3);
        overflow: hidden;
        transition: transform 0.2s ease;
        border: 1px solid rgba(182, 171, 109, 0.35);
        display: flex;
        flex-direction: column;
        height: 580px;
    }
    .glass-card:hover {
        transform: translateY(-2px);
    }
    .card-header {
        background: linear-gradient(135deg, #253224, #184709);
        padding: 0.7rem 1.2rem;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 2px solid #B6AB6D;
        flex-shrink: 0;
    }
    .card-header i {
        font-size: 1.5rem;
        color: #FFDFF6;
    }
    .card-header h2 {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 700;
        font-size: 1.3rem;
        color: #FAF5E2;
        margin: 0;
    }
    .card-header p {
        font-size: 0.65rem;
        color: #ADD6AB;
        margin-left: auto;
        font-weight: 500;
    }
    /* ========== CHATBOT compact ========== */
    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 0.5rem 0.8rem;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        background: #FAF5E2;
    }
    .message {
        display: flex;
        gap: 6px;
        animation: fadeSlideUp 0.2s ease;
    }
    @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(4px);}
        to { opacity: 1; transform: translateY(0);}
    }
    .message-avatar {
        width: 24px;
        height: 24px;
        background: #2E3615;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #FAF5E2;
        font-size: 0.7rem;
        flex-shrink: 0;
    }
    .user .message-avatar {
        background: #747439;
    }
    .message-bubble {
        background: white;
        padding: 4px 10px;
        border-radius: 14px;
        border-top-left-radius: 3px;
        font-size: 1rem;
        line-height: 1.3;
        color: #1e2a1a;
        max-width: 85%;
        box-shadow: 0 1px 1px rgba(0,0,0,0.03);
        border: 1px solid #e2e8cf;
    }
    .user .message-bubble {
        background: #eef5ea;
        border-bottom-right-radius: 3px;
        border-left: 2px solid #89C63D;
    }
    .assistant .message-bubble {
        background: #ffffffea;
        border-left: 2px solid #B6AB6D;
    }
    .chat-input-area {
        padding: 0.5rem 0.8rem 0.6rem;
        background: #fefcf2;
        border-top: 1px solid #D9E0C5;
        display: flex;
        gap: 6px;
        flex-shrink: 0;
    }
    .chat-input-area input {
        flex: 1;
        border: 1.5px solid #AAAA7F;
        border-radius: 30px;
        padding: 6px 12px;
        font-size: 0.75rem;
        background: white;
    }
    .chat-input-area input:focus {
        border-color: #89C63D;
        outline: none;
        box-shadow: 0 0 0 2px rgba(137,198,61,0.2);
    }
    .chat-input-area button {
        background: #184709;
        border: none;
        width: 32px;
        border-radius: 30px;
        color: #FAF5E2;
        font-size: 0.9rem;
        cursor: pointer;
    }
    /* ========== QUIZ très aéré ========== */
    .quiz-container {
        flex: 1;
        padding: 1.5rem 1.5rem;
        background: #FAF5E2;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
    }
    .quiz-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 1.8rem;
        flex-wrap: wrap;
        border-bottom: 2px dashed #B6AB6D;
        padding-bottom: 0.8rem;
        flex-shrink: 0;
    }
    .quiz-title {
        font-family: 'Cormorant Garamond', serif;
        font-weight: 700;
        font-size: 1.6rem;
        color: #253224;
    }
    .quiz-score-badge {
        background: #2E3615;
        padding: 6px 14px;
        border-radius: 40px;
        color: #FAF5E2;
        font-size: 0.85rem;
        font-weight: 600;
    }
    .question-text {
        font-size: 1.35rem;
        font-weight: 600;
        color: #184709;
        margin-bottom: 1.8rem;
        line-height: 1.45;
    }
    .options-list {
        display: flex;
        flex-direction: column;
        gap: 16px;
        margin-bottom: 1.8rem;
    }
    .option {
        background: white;
        border: 1.5px solid #AAAA7F;
        border-radius: 60px;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 500;
        transition: all 0.15s;
    }
    .option.selected {
        background: #e1f0d4;
        border-color: #89C63D;
    }
    .option input {
        accent-color: #184709;
        width: 18px;
        height: 18px;
    }
    .quiz-buttons {
        display: flex;
        gap: 16px;
        justify-content: space-between;
        margin-top: 0.8rem;
        flex-shrink: 0;
    }
    .quiz-btn {
        background: #747439;
        border: none;
        padding: 10px 22px;
        border-radius: 40px;
        font-weight: 600;
        color: #FAF5E2;
        cursor: pointer;
        font-size: 0.85rem;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }
    .quiz-btn.primary {
        background: #184709;
    }
    .result-area {
        margin-top: 1.5rem;
        background: #ffffffc9;
        border-radius: 28px;
        padding: 18px;
        text-align: center;
        border-left: 5px solid #89C63D;
        font-size: 0.9rem;
    }
    .footer-note {
        text-align: center;
        font-size: 0.6rem;
        margin-top: 0.8rem;
        color: #AAAA7F;
        grid-column: span 2;
    }
    .typing-indicator {
        display: flex;
        gap: 4px;
        padding: 4px 8px;
        background: #e9f0e3;
        border-radius: 14px;
        width: fit-content;
    }
    .typing-indicator span {
        width: 5px;
        height: 5px;
        background: #747439;
        border-radius: 50%;
        animation: blink 1.2s infinite;
    }
    @keyframes blink {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
    }
    /* ========== CORRECTION MOBILE : les deux cartes bien visibles ========== */
    @media (max-width: 850px) {
        .dashboard {
            grid-template-columns: 1fr;
            gap: 1rem;
        }
        .glass-card {
            height: auto !important;
            min-height: auto !important;
            max-height: none !important;
            margin-bottom: 0.5rem;
        }
        body {
            padding: 0.6rem;
        }
        .quiz-container {
            padding: 1.2rem;
        }
        .question-text {
            font-size: 1.2rem;
        }
        .option {
            padding: 10px 16px;
            font-size: 0.9rem;
        }
        /* On s'assure que le chatbot n'est pas caché */
        .chat-messages {
            min-height: 200px;
        }
    }
</style>
</head>
<body>
<div class="dashboard">
    <!-- CHATBOT CARD -->
    <div class="glass-card">
        <div class="card-header">
            <i class="fas fa-robot"></i>
            <h2>Zitouna · Chatbot IA</h2>
            <p>🧠 huilier tunisien</p>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="message-avatar"><i class="fas fa-leaf"></i></div>
                <div class="message-bubble">🌿 أهلا وسهلا ! Je suis Zitouna, ton expert en huile d'olive. Parle-moi d'or vert, de dégustation ou dis juste bonjour — je suis là pour toi.</div>
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Écris ton message...">
            <button id="sendChatBtn"><i class="fas fa-feather-alt"></i></button>
        </div>
    </div>

    <!-- QUIZ CARD -->
    <div class="glass-card">
        <div class="card-header">
            <i class="fas fa-olive-branch"></i>
            <h2>Le Défi Vert</h2>
            <p>🏆 quiz</p>
        </div>
        <div class="quiz-container" id="quizContainer">
            <div class="quiz-header">
                <div class="quiz-title">🍈 Maîtrise de l'olivier</div>
                <div class="quiz-score-badge" id="scoreDisplay">Score: 0 / 5</div>
            </div>
            <div id="quizDynamicArea" style="flex:1; display: flex; flex-direction: column;">
                <div class="question-text" id="questionText"></div>
                <div class="options-list" id="optionsList"></div>
                <div class="quiz-buttons">
                    <button class="quiz-btn" id="prevBtn"><i class="fas fa-arrow-left"></i> Préc.</button>
                    <button class="quiz-btn primary" id="nextBtn">Suivant →</button>
                    <button class="quiz-btn" id="resetQuizBtn"><i class="fas fa-sync-alt"></i> Refaire</button>
                </div>
                <div id="quizResult" class="result-area" style="display: none;"></div>
            </div>
        </div>
    </div>
    <div class="footer-note">
        <i class="fas fa-seedling"></i> Dar El Zit · la maison de l'oliveraie tunisienne
    </div>
</div>

<script>
    // ---------- REMPLACE PAR TA VRAIE CLÉ API ----------
    const API_KEY = "AIzaSyA0pLT2Cz2IcDsq2I1H3tdSvhrwHIXnU-o";
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

    // DOM elements
    const chatMessagesDiv = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendChatBtn');

    function scrollChatBottom() {
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/\n/g, '<br>');
    }

    function addMessage(role, text, isHtml = false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        const avatar = role === 'user' ? '<i class="fas fa-user-astronaut"></i>' : '<i class="fas fa-tree"></i>';
        msgDiv.innerHTML = `
            <div class="message-avatar">${avatar}</div>
            <div class="message-bubble">${isHtml ? text : escapeHtml(text)}</div>
        `;
        chatMessagesDiv.appendChild(msgDiv);
        scrollChatBottom();
    }

    function showTyping() {
        const typingDiv = document.createElement('div');
        typingDiv.id = 'typingIndicator';
        typingDiv.className = 'message assistant';
        typingDiv.innerHTML = `<div class="message-avatar"><i class="fas fa-tree"></i></div><div class="typing-indicator"><span></span><span></span><span></span></div>`;
        chatMessagesDiv.appendChild(typingDiv);
        scrollChatBottom();
    }
    function hideTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    async function getFriendlyAIResponse(question) {
        if (!question.trim()) return "Dis-moi quelque chose, je t'écoute !";
        const systemPrompt = `Tu es Zitouna, un expert tunisien en huile d'olive, mais aussi un compagnon chaleureux. Tu parles français avec quelques mots d'arabe tunisien (أهلا, برشة, etc.). Règles :
- Si l'utilisateur dit bonjour, comment ça va, ou fait du small talk, réponds de façon naturelle, amicale et courte.
- Si l'utilisateur pose une question sur l'huile d'olive (extraction, qualité, conservation, dégustation, variétés comme Chemlali, etc.), réponds avec précision, 2 à 4 phrases, donne des chiffres clés (températures, acidité).
- Si l'utilisateur parle d'un sujet totalement étranger (sport, politique, technologie hors alimentation), réponds gentiment : "Désolé, je suis spécialisé dans l'or vert tunisien. Mais je peux te parler d'olives ou de recettes si tu veux !"
- Sois détendu, utilise parfois des émojis.
Question: ${question}`;
        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt }] }] })
            });
            if (!response.ok) throw new Error(await response.text());
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        } catch (error) {
            console.error(error);
            return `❌ Oups, problème technique : ${error.message}. Vérifie ta clé API. 🌿`;
        }
    }

    async function sendUserMessage() {
        const question = chatInput.value.trim();
        if (!question) return;
        addMessage('user', question);
        chatInput.value = '';
        showTyping();
        const reply = await getFriendlyAIResponse(question);
        hideTyping();
        addMessage('assistant', reply, true);
    }

    sendBtn.addEventListener('click', sendUserMessage);
    chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendUserMessage(); });

    // ---------- QUIZ ----------
    const quizData = [
        { text: "🌡️ Température idéale pour le malaxage (polyphénols) ?", options: ["10-15°C", "18-24°C", "27-32°C", "35-40°C"], correct: 1 },
        { text: "🏺 Système d'extraction le plus riche en polyphénols ?", options: ["3 phases avec eau", "2 phases sans eau", "Pressoir pierre", "Solvant"], correct: 1 },
        { text: "🔬 Acidité max pour extra vierge premium ?", options: ["0,8%", "1,5%", "2,0%", "0,3%"], correct: 0 },
        { text: "🍃 Défaut sensoriel = mauvaise fermentation ?", options: ["Amer", "Piquant", "Moisi/humide", "Fruité vert"], correct: 2 },
        { text: "⏳ Meilleure conservation après extraction ?", options: ["Bouteille transparente soleil", "Citerne inox + azote, obscurité", "Baril plastique", "Fût chêne"], correct: 1 }
    ];

    let currentQIndex = 0, userAnswers = new Array(quizData.length).fill(null), quizCompleted = false;
    const questionTextElem = document.getElementById('questionText'), optionsListElem = document.getElementById('optionsList');
    const prevBtn = document.getElementById('prevBtn'), nextBtn = document.getElementById('nextBtn'), resetQuizBtn = document.getElementById('resetQuizBtn');
    const scoreDisplaySpan = document.getElementById('scoreDisplay'), quizResultDiv = document.getElementById('quizResult');

    function updateScoreDisplay() {
        let score = 0;
        for (let i = 0; i < quizData.length; i++) if (userAnswers[i] === quizData[i].correct) score++;
        scoreDisplaySpan.innerText = `Score: ${score} / ${quizData.length}`;
    }

    function renderCurrentQuestion() {
        if (quizCompleted) return;
        const q = quizData[currentQIndex];
        questionTextElem.innerText = q.text;
        optionsListElem.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const isChecked = (userAnswers[currentQIndex] === idx);
            const optionDiv = document.createElement('div');
            optionDiv.className = `option ${isChecked ? 'selected' : ''}`;
            const radioId = `opt_${currentQIndex}_${idx}`;
            optionDiv.innerHTML = `<input type="radio" name="quizOption" value="${idx}" id="${radioId}" ${isChecked ? 'checked' : ''}><label for="${radioId}" style="flex:1; cursor:pointer;">${opt}</label>`;
            const radio = optionDiv.querySelector('input');
            radio.addEventListener('change', () => {
                if (radio.checked) {
                    document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
                    optionDiv.classList.add('selected');
                    userAnswers[currentQIndex] = idx;
                    updateScoreDisplay();
                }
            });
            optionDiv.addEventListener('click', (e) => { if (e.target.tagName !== 'INPUT') { radio.checked = true; radio.dispatchEvent(new Event('change')); } });
            optionsListElem.appendChild(optionDiv);
        });
        prevBtn.disabled = (currentQIndex === 0);
        nextBtn.innerHTML = (currentQIndex === quizData.length - 1) ? '🏆 Terminer' : 'Suivant →';
        quizResultDiv.style.display = 'none';
    }

    function showFinalResults() {
        quizCompleted = true;
        let score = 0, details = '';
        for (let i = 0; i < quizData.length; i++) {
            const isCorrect = (userAnswers[i] === quizData[i].correct);
            if (isCorrect) score++;
            const userChoice = userAnswers[i] !== null ? quizData[i].options[userAnswers[i]] : "Pas de réponse";
            const correctAns = quizData[i].options[quizData[i].correct];
            details += `<div style="margin-bottom:8px; border-bottom:1px solid #ddd6c6; padding-bottom:5px;"><strong>❓ ${quizData[i].text}</strong><br>✅ ${correctAns}<br>${isCorrect ? '✔️ Toi : ' + userChoice : '❌ Toi : ' + userChoice}</div>`;
        }
        const percent = Math.round((score/quizData.length)*100);
        let medal = percent === 100 ? "🏆 MAÎTRE ABSOLU !" : (percent>=80 ? "🌟 Expert !" : (percent>=60 ? "🍈 Bonne base !" : "🌿 Revois les bases."));
        quizResultDiv.innerHTML = `<i class="fas fa-olive" style="font-size:1.2rem;"></i><h3 style="font-size:1rem; margin:5px 0;">Score : ${score}/${quizData.length} (${percent}%)</h3><p style="font-size:0.75rem;">${medal}</p><div style="max-height:160px; overflow:auto; text-align:left; font-size:0.7rem;">${details}</div><button id="retakeQuizBtn" class="quiz-btn primary" style="margin-top:8px;">⟳ Refaire</button>`;
        quizResultDiv.style.display = 'block';
        questionTextElem.style.display = 'none';
        optionsListElem.style.display = 'none';
        prevBtn.style.display = 'none';
        nextBtn.style.display = 'none';
        resetQuizBtn.style.display = 'none';
        document.getElementById('retakeQuizBtn')?.addEventListener('click', () => resetQuiz());
    }

    function resetQuiz() {
        userAnswers.fill(null); currentQIndex = 0; quizCompleted = false;
        questionTextElem.style.display = 'block'; optionsListElem.style.display = 'flex';
        prevBtn.style.display = 'inline-flex'; nextBtn.style.display = 'inline-flex'; resetQuizBtn.style.display = 'inline-flex';
        quizResultDiv.style.display = 'none'; updateScoreDisplay(); renderCurrentQuestion();
    }
    function nextQuestion() { if (!quizCompleted) { if (currentQIndex < quizData.length-1) { currentQIndex++; renderCurrentQuestion(); } else showFinalResults(); } }
    function prevQuestion() { if (!quizCompleted && currentQIndex > 0) { currentQIndex--; renderCurrentQuestion(); } }
    nextBtn.addEventListener('click', nextQuestion); prevBtn.addEventListener('click', prevQuestion); resetQuizBtn.addEventListener('click', resetQuiz);
    resetQuiz();
</script>
</body>
</html>
